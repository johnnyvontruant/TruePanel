flightdeck:
  rotation_interval: 5
  pause_after_button: 60
  idle_slowdown_after: 3600
  idle_interval: 30

  startup:
    enabled: true
    delay: 0.75
    frames:
      - ["TruePanel", "Flight Deck"]
      - ["Mission Ctrl", "Online"]
      - ["Collectors", "Ready"]
      - ["Mission Ready", ""]

theme:
  healthy_message: "Mission Ready"
  startup_title: "TruePanel"
  startup_subtitle: "Flight Deck"
  warning_prefix: "! "
  critical_prefix: "!!"
  info_prefix: "i "
  healthy_prefix: "OK"
