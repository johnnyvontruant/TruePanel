theme_pack: tactical

flightdeck:
  rotation_interval: 5
  pause_after_button: 60
  idle_slowdown_after: 3600
  idle_interval: 30

  transitions:
    enabled: true

  startup:
    enabled: true
    delay: 0.18
    diagnostics: true

  night_mode:
    enabled: true
    idle_after: 1800
    rotation_interval: 60
    suppress_info: true
    dashboard_pages:
      - home
      - storage
      - capacity

theme:
  healthy_message: "Mission Ready"
  startup_title: "TruePanel"
  startup_subtitle: "Flight Deck"
  warning_prefix: "! "
  critical_prefix: "X "
  info_prefix: "i "
  healthy_prefix: "O "

buzzer:
  enabled: true
  backend: pcspkr
  device: auto

  startup: long
  shutdown: short
  warning: short
  critical: long

  short_frequency: 880
  short_duration: 0.20
  long_frequency: 660
  long_duration: 0.65

  cooldown: 30

plugins:
  path: plugins
  external_enabled: true
  disabled: []

  # Third-party plugin settings live under their plugin ID.
  config: {}
